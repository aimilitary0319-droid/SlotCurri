experiment_group: slotcurri
experiment_name: movi_e_attnmass_ste

globals:
  # attention-mass curriculum: slot pool matched to the SlotContrast/SlotCurri
  # baselines (max 15 slots) for a fair comparison. The curriculum gates how many
  # of these 15 are active per frame rather than growing the pool over training.
  NUM_SLOTS: 15
  SLOT_DIM: 128
  DINO_MODEL: vit_base_patch14_dinov2
  FEAT_DIM: 768
  NUM_PATCHES: 576
  NUM_GPUS: 2
  BATCH_SIZE_PER_GPU: 64
  TOTAL_BATCH_SIZE: "${mul: ${.NUM_GPUS}, ${.BATCH_SIZE_PER_GPU}}"
  BASE_LR: 0.0001

trainer:
  max_steps: 300000
  log_every_n_steps: 2500
  val_check_interval: 2500
  gradient_clip_val: 0.05

optimizer:
  name: Adam
  # Scale learning rate by batch size: take base lr once for every 32 samples
  lr: 0.0008
  lr_scheduler:
    name: exp_decay_with_warmup
    warmup_steps: 2500
    decay_steps: ${trainer.max_steps}

model:
  experiment_name: ${experiment_name}
  experiment_group: ${experiment_group}
  input_type: video
  max_steps: 300000
  visualize: false
  visualize_every_n_steps: 10000

  # --- attention-mass curriculum (STE gating) ---
  # Slots whose per-slot attention mass (fraction of patches claimed in the last
  # cross-attention iteration) exceeds `p` are "active"; only active slots (plus the
  # always-active default slots) are decoded and contribute to the loss. Non-active
  # slots freeze their state and carry it unchanged to the next frame.
  attn_mass_curriculum:
    enabled: true
    n_default: 2        # slots 0,1 are always active (exempt from the threshold)
    p_start_mult: 5     # p_start = 5 / n_slots (strict: 5x the uniform mass 1/n_slots)
    p_end_mult: 0.5     # p_end   = 0.5 / n_slots (half the uniform mass); also used at eval
    anneal_steps: 200000 # linear anneal over ~2/3 of max_steps; final 1/3 trains at the loose p_end
    # gating mode:
    #   hard = binary active/dormant (bool); dormant slots fully removed.
    #   soft = differentiable sigmoid gate g = sigmoid((mass - p) / tau) in [0,1], with tau
    #          annealed wide -> sharp (soft-to-hard curriculum); no true dormancy until tau->0.
    #   ste  = straight-through: forward = hard 0/1 (true dormancy every step, like hard),
    #          backward = sigmoid surrogate gradient (differentiable, like soft).
    # STE gets hard's crisp forward removal (no decoder-renorm loophole -> real
    # over-fragmentation suppression) AND a differentiable boundary, with no extra
    # sparsity knob. tau here shapes ONLY the backward surrogate; the forward decision
    # is a plain threshold at `p`, so at eval STE == pure hard thresholding at p_end
    # (tau is irrelevant at inference).
    gate_mode: ste
    gate_tau_start_mult: 0.5  # tau_start = 0.5 / n_slots (wide backward surrogate early)
    gate_tau_end_mult: 0.05   # tau_end   = 0.05 / n_slots (sharp surrogate late; reduces STE bias)
    # gate_l1: not needed for STE. Forward-hard removal already forces consolidation
    # (removed fragments -> reconstruction penalty), unlike pure soft. Left at 0; a small
    # value (e.g. 0.01) may be added as an ablation for extra slot-count control.
    gate_l1: 0.0
    # --- slot score shaping ---
    # mass_gamma: per-patch attention raised to gamma and renormalized before the mass
    # average. 1.0 = plain attention mass (existing score, unchanged); >1 sharpens toward
    # the per-patch argmax winner share (suppresses "always-second" ghost slots). Kept at
    # 1.0 here; available as an ablation.
    mass_gamma: 1.0
    # purity rescue: purity = sum_p A^2 / sum_p A in (0,1] measures how dominantly a slot
    # owns the patches it claims, independent of its size. Slots with purity >= q stay
    # active even below the mass threshold, protecting small-but-cleanly-owned objects
    # from the p_end cutoff (~3.3% of patches). q anneals q_start -> q_end alongside p.
    # DISABLED for the first run: the rescue also protects small *fragments* (which
    # cleanly own their patches too), weakening the core anti-over-fragmentation
    # pressure of the forward-hard removal. Kept as an ablation card: if validation
    # shows small objects being absorbed, first try lowering p_end_mult (e.g. 0.3),
    # then re-enable by uncommenting purity_q_end below.
    # purity_q_start: 1.5
    # purity_q_end: 0.5   # "owns its claimed patches by majority on average"
    # purity_tau: 0.05    # sigmoid temperature for the purity gate (ste backward surrogate)

  losses:
    loss_featrec:
      name: MSELoss
      pred_dims:
        - 0
        - ${globals.FEAT_DIM}
    loss_ssim:
      name: SSIMLoss
      pred_key: encoder.SSIM_recon
      target_key: encoder.SSIM_orig
      pred_dims:
        - 0
        - ${globals.FEAT_DIM}
    loss_ss:
      name: Slot_Slot_Contrastive_Loss
      pred_key: processor.state
      temperature: 0.1
      batch_contrast: true
      patch_inputs: false
      keep_input_dim: true

  loss_weights:
    loss_featrec: 1.0
    loss_ssim: 0.05
    loss_ss: 0.5

  initializer:
    # STE uses forward-hard gating, so dormant slots receive NO reconstruction gradient
    # (only a weak counterfactual gate-path gradient). Learnable prototypes can therefore
    # under-train / collapse under this regime, so we use a FIXED orthonormal init:
    # it guarantees diverse, well-separated starting directions for every slot for free,
    # without relying on the (weak) dormant gradient. (FixedLearnedInit -- the baseline --
    # remains available as an ablation if you want a pure "gating-only" comparison.)
    name: FixedOrthogonalInit
    n_slots: ${globals.NUM_SLOTS}
    dim: ${globals.SLOT_DIM}

  encoder:
    backbone:
      name: TimmExtractor
      model: ${globals.DINO_MODEL}
      features:
      - vit_block12
      - vit_block_keys12
      frozen: true
      pretrained: true
      model_kwargs:
        dynamic_img_size: True
    output_transform:
      name: networks.two_layer_mlp
      inp_dim: ${globals.FEAT_DIM}
      outp_dim: ${globals.SLOT_DIM}
      hidden_dim: "${mul: ${globals.FEAT_DIM}, 2}"
      layer_norm: true

  grouper:
    name: SlotAttention
    inp_dim: ${globals.SLOT_DIM}
    slot_dim: ${globals.SLOT_DIM}
    n_iters: 2
    use_mlp: true

  latent_processor:
    first_step_corrector_args:
      n_iters: 3

  decoder:
    name: MLPDecoder
    inp_dim: ${globals.SLOT_DIM}
    outp_dim: ${globals.FEAT_DIM}
    hidden_dims: [1024, 1024, 1024]
    n_patches: ${globals.NUM_PATCHES}

  predictor:
    name: networks.TransformerEncoder
    dim: ${globals.SLOT_DIM}
    n_blocks: 1
    n_heads: 4

val_metrics:
  ari:
    name: VideoARI
    ignore_background: true
    pred_key: decoder_masks_hard
    true_key: segmentations
  image_ari:
    name: ImageARI
    ignore_background: true
    video_input: true
    pred_key: decoder_masks_hard
    true_key: segmentations
  mbo:
    name: VideoIoU
    matching: overlap
    ignore_background: true
    pred_key: decoder_masks_hard
    true_key: segmentations
  image_mbo:
    name: ImageIoU
    matching: overlap
    ignore_background: true
    video_input: true
    pred_key: decoder_masks_hard
    true_key: segmentations

dataset:
  train_shards: "movi_e/movi_e-train-{000000..000304}.tar"
  val_shards: "movi_e/movi_e-validation-{000000..000007}.tar"
  batch_size: ${globals.BATCH_SIZE_PER_GPU}
  val_batch_size: 4
  val_size: 250
  num_workers: 4
  num_val_workers: 1
  train_pipeline:
    video_size: 24
    chunk_size: 4
    sample_one_chunk_per_video: true
    keys: [video]
    shuffle_size: 512
    transforms:
      name: movi_train
      type: video
      input_size: 336
      h_flip_prob: 0.5
  val_pipeline:
    use_chunks: false
    keys: [video, segmentations]
    transforms:
      name: movi_val
      type: video
      input_size: 336
      num_classes: 24
